name: Refresh dashboard

on:
  # Every 30 minutes
  schedule:
    - cron: "*/30 * * * *"
  # Manual trigger from Actions tab
  workflow_dispatch: {}
  # Run on push to main (initial deploy)
  push:
    branches: [main]
    paths:
      - "**.py"
      - "templates/**"
      - "requirements.txt"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          # Optional — leave unset for fallback (rule-based) summary
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          # Optional — leave unset to use Yahoo Finance for KOSPI/KOSDAQ
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ENV: ${{ secrets.KIS_ENV }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== pre-add status ==="
          git status --short
          echo "=== generated files on disk ==="
          ls -la reports/dashboard.html reports/2026/*/*/*.html 2>/dev/null | tail -5

          git add -A reports/
          echo "=== post-add staged files ==="
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Refresh dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
